<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel administratora – Unity House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="admin.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="system.js"></script>
</head>

<body class="uh-body">

<header class="uh-topbar pro-topbar">
    <div class="uh-logo pro-logo">Unity House</div>
    <nav class="uh-nav">
        <span class="uh-nav-label pro-nav-label">Panel administratora</span>
        <button id="logoutBtn" class="uh-btn uh-btn-outline pro-logout">Wyloguj</button>
    </nav>
</header>

<main class="uh-main panel pro-panel">

    <!-- SEKCJA 1 — WSPÓLNOTY -->
    <section class="panel-section pro-section">
        <h2 class="pro-section-title">Wspólnoty mieszkaniowe</h2>

        <form id="communityForm" class="inline-form pro-inline-form">
            <input type="text" id="communityName" placeholder="Nazwa" required class="pro-input">
            <input type="text" id="communityAddress" placeholder="Adres" required class="pro-input">
            <button class="uh-btn uh-btn-gold pro-btn">Dodaj</button>
        </form>

        <div id="communitiesList" class="list pro-list"></div>
    </section>


    <!-- SEKCJA 2 — OCZEKUJĄCY MIESZKAŃCY -->
    <section class="panel-section pro-section">
        <h2 class="pro-section-title">Oczekujący mieszkańcy</h2>

        <table id="pendingTable" class="uh-table pro-table">
            <thead>
                <tr>
                    <th>Login</th>
                    <th>Wspólnota</th>
                    <th>Akcja</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>


    <!-- SEKCJA 3 — ZGŁOSZENIA -->
    <section class="panel-section pro-section">
        <h2 class="pro-section-title">Zgłoszenia mieszkańców</h2>
        <div id="adminTicketsList" class="tickets-list pro-tickets"></div>
    </section>

</main>

<script>
// ---------------------------------------------
// WYLOGOWANIE
// ---------------------------------------------
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
document.getElementById("logoutBtn").onclick = logout;


// ---------------------------------------------
// ŁADOWANIE WSPÓLNOT
// ---------------------------------------------
async function loadCommunities() {
    const { data, error } = await client
        .from("communities")
        .select("*")
        .order("name", { ascending: true });

    const container = document.getElementById("communitiesList");
    container.innerHTML = "";

    if (error) {
        container.textContent = "Błąd ładowania wspólnot.";
        return;
    }

    if (!data.length) {
        container.textContent = "Brak dodanych wspólnot.";
        return;
    }

    data.forEach(c => {
        const div = document.createElement("div");
        div.className = "list-item pro-list-item";
        div.textContent = `${c.name} – ${c.address}`;
        container.appendChild(div);
    });
}


// ---------------------------------------------
// DODAWANIE WSPÓLNOTY
// ---------------------------------------------
document.getElementById("communityForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = communityName.value.trim();
    const address = communityAddress.value.trim();

    if (!name || !address) return;

    const { error } = await client
        .from("communities")
        .insert({ name, address });

    if (error) {
        alert("Nie udało się dodać wspólnoty.");
        return;
    }

    communityName.value = "";
    communityAddress.value = "";
    loadCommunities();
});


// ---------------------------------------------
// OCZEKUJĄCY MIESZKAŃCY
// ---------------------------------------------
async function loadPendingResidents() {
    const { data, error } = await client
        .from("users")
        .select(`
            id,
            login,
            wspolnota,
            communities:communities(name)
        `)
        .eq("approved", false);

    const tbody = document.querySelector("#pendingTable tbody");
    tbody.innerHTML = "";

    if (error) {
        console.error("Błąd Supabase:", error);
        tbody.innerHTML = "<tr><td colspan='3'>Błąd ładowania.</td></tr>";
        return;
    }

    if (!data.length) {
        tbody.innerHTML = "<tr><td colspan='3'>Brak oczekujących mieszkańców.</td></tr>";
        return;
    }

    data.forEach(user => {
        const wspolnotaNazwa = user.communities?.name || "—";

        const row = document.createElement("tr");
        row.className = "pro-row";
        row.innerHTML = `
            <td>${user.login}</td>
            <td>${wspolnotaNazwa}</td>
            <td>
                <button class="uh-btn uh-btn-small uh-btn-gold pro-btn-small" onclick="approveUser('${user.id}')">
                    Zatwierdź
                </button>
                <button class="uh-btn uh-btn-small pro-btn-small" onclick="rejectUser('${user.id}')">
                    Odrzuć
                </button>
            </td>
        `;
        tbody.appendChild(row);
    });
}


// ---------------------------------------------
// ZATWIERDZANIE UŻYTKOWNIKA
// ---------------------------------------------
async function approveUser(userId) {
    const { error } = await client
        .from("users")
        .update({ approved: true })
        .eq("id", userId);

    if (error) {
        alert("Błąd zatwierdzania: " + error.message);
        return;
    }

    alert("Użytkownik został zatwierdzony.");
    loadPendingResidents();
}


// ---------------------------------------------
// ODRZUCANIE UŻYTKOWNIKA
// ---------------------------------------------
async function rejectUser(userId) {
    const { error } = await client
        .from("users")
        .delete()
        .eq("id", userId);

    if (error) {
        alert("Błąd odrzucania: " + error.message);
        return;
    }

    alert("Użytkownik został odrzucony i usunięty.");
    loadPendingResidents();
}


// ---------------------------------------------
// ZGŁOSZENIA
// ---------------------------------------------
async function loadAdminTickets() {
    const { data, error } = await client
        .from("tickets")
        .select("*")
        .order("created_at", { ascending: false });

    const container = document.getElementById("adminTicketsList");
    container.innerHTML = "";

    if (error) {
        container.textContent = "Błąd ładowania zgłoszeń.";
        return;
    }

    if (!data.length) {
        container.textContent = "Brak zgłoszeń.";
        return;
    }

    data.forEach(t => {
        const div = document.createElement("div");
        div.className = "ticket-card pro-ticket-card";
        div.innerHTML = `
            <h3>${t.title}</h3>
            <p>${t.description}</p>
            <span class="ticket-status pro-status">Status: ${t.status}</span>
            <div class="pro-ticket-actions">
                <button data-id="${t.id}" data-status="w trakcie" class="uh-btn uh-btn-small pro-btn-small">W trakcie</button>
                <button data-id="${t.id}" data-status="zakończone" class="uh-btn uh-btn-small uh-btn-gold pro-btn-small">Zakończ</button>
            </div>
        `;
        container.appendChild(div);
    });

    container.querySelectorAll("button[data-id]").forEach(btn => {
        btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-id");
            const status = btn.getAttribute("data-status");

            const { error } = await client
                .from("tickets")
                .update({ status })
                .eq("id", id);

            if (error) {
                alert("Nie udało się zmienić statusu.");
                return;
            }

            loadAdminTickets();
        });
    });
}


// ---------------------------------------------
// START
// ---------------------------------------------
loadCommunities();
loadPendingResidents();
loadAdminTickets();

</script>

</body>
</html>
