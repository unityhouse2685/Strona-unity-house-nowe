<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel administratora – Unity House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="admin.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="system.js"></script>
</head>

<body class="uh-body">

<header class="uh-topbar pro-topbar">
    <div class="uh-logo pro-logo">Unity House</div>
    <nav class="uh-nav">
        <span class="uh-nav-label pro-nav-label">Panel administratora</span>
        <button id="logoutBtn" class="uh-btn uh-btn-outline pro-logout">Wyloguj</button>
    </nav>
</header>

<main class="uh-main panel pro-panel">

    <!-- SEKCJA WSPÓLNOT -->
    <section class="panel-section pro-section">
        <h2 class="pro-section-title">Wspólnoty mieszkaniowe</h2>

        <div id="communitiesList" class="communities-list pro-communities"></div>

        <div class="add-community-box">
            <h3>Dodaj nową wspólnotę</h3>
            <input id="newCommunityName" class="uh-input" placeholder="Nazwa wspólnoty">
            <button id="addCommunityBtn" class="uh-btn uh-btn-gold">Dodaj</button>
        </div>
    </section>

    <hr class="pro-divider">

    <!-- NOWE KONTA DO AKCEPTACJI -->
    <section class="panel-section pro-section">
        <h2 class="pro-section-title">Nowe konta do akceptacji</h2>
        <div id="pendingUsersList" class="users-list pro-users"></div>
    </section>

    <hr class="pro-divider">

    <!-- ZGŁOSZENIA -->
    <section class="panel-section pro-section">
        <h2 class="pro-section-title">Zgłoszenia mieszkańców</h2>
        <div id="ticketsList" class="tickets-list pro-tickets"></div>
    </section>

</main>

<style>
.ticket-card.completed {
    opacity: 0.45;
    filter: grayscale(100%);
    pointer-events: none;
}

.ticket-files img {
    width: 120px;
    height: auto;
    margin: 6px 6px 0 0;
    border-radius: 6px;
}

.ticket-files a {
    display: block;
    margin-top: 4px;
    color: #d4af37;
    text-decoration: none;
}

.user-card {
    background: #1c1c1c;
    padding: 14px;
    border-radius: 8px;
    margin-bottom: 12px;
}
</style>

<script defer>

/* ---------------------------------------------
   WYLOGOWANIE
--------------------------------------------- */
document.getElementById("logoutBtn").onclick = () => logout();

/* ---------------------------------------------
   ŁADOWANIE WSPÓLNOT
--------------------------------------------- */
async function loadCommunities() {
    const { data, error } = await client
        .from("communities")
        .select("*")
        .order("name", { ascending: true });

    const box = document.getElementById("communitiesList");
    box.innerHTML = "";

    if (error) {
        box.textContent = "Błąd ładowania wspólnot.";
        console.error(error);
        return;
    }

    data.forEach(c => {
        const div = document.createElement("div");
        div.className = "community-card pro-community-card";

        div.innerHTML = `
            <span>${c.name}</span>
            <button class="uh-btn uh-btn-outline delete-btn">Usuń</button>
        `;

        div.querySelector(".delete-btn").onclick = async () => {
            await client.from("communities").delete().eq("id", c.id);
            loadCommunities();
        };

        box.appendChild(div);
    });
}

document.getElementById("addCommunityBtn").onclick = async () => {
    const name = document.getElementById("newCommunityName").value.trim();
    if (!name) return;

    await client.from("communities").insert({ name });
    document.getElementById("newCommunityName").value = "";
    loadCommunities();
};

/* ---------------------------------------------
   NOWE KONTA DO AKCEPTACJI
--------------------------------------------- */
async function loadPendingUsers() {
    const { data, error } = await client
        .from("users")
        .select("*")
        .eq("approved", false)
        .order("created_at", { ascending: true });

    const box = document.getElementById("pendingUsersList");
    box.innerHTML = "";

    if (error) {
        box.textContent = "Błąd ładowania użytkowników.";
        console.error(error);
        return;
    }

    if (!data.length) {
        box.textContent = "Brak kont do akceptacji.";
        return;
    }

    // pobieramy wspólnoty do mapowania ID → nazwa
    const { data: wspolnoty } = await client
        .from("communities")
        .select("id, name");

    data.forEach(u => {
        const wsp = wspolnoty.find(w => w.id === u.community_id);

        const div = document.createElement("div");
        div.className = "user-card";

        div.innerHTML = `
            <p><strong>Email:</strong> ${u.login}</p>
            <p><strong>Wspólnota:</strong> ${wsp ? wsp.name : "—"}</p>

            <button class="uh-btn uh-btn-gold accept-btn">Akceptuj</button>
            <button class="uh-btn uh-btn-outline delete-btn">Usuń</button>
        `;

        div.querySelector(".accept-btn").onclick = async () => {
            await client.from("users").update({ approved: true }).eq("id", u.id);
            loadPendingUsers();
        };

        div.querySelector(".delete-btn").onclick = async () => {
            await client.from("users").delete().eq("id", u.id);
            loadPendingUsers();
        };

        box.appendChild(div);
    });
}

/* ---------------------------------------------
   ZGŁOSZENIA
--------------------------------------------- */
async function loadTickets() {
    const { data, error } = await client
        .from("tickets")
        .select(`
            id,
            title,
            description,
            priority,
            status,
            created_at,
            users ( login, community_id )
        `)
        .order("created_at", { ascending: false });

    const container = document.getElementById("ticketsList");
    container.innerHTML = "";

    if (error) {
        container.textContent = "Błąd ładowania zgłoszeń.";
        console.error(error);
        return;
    }

    if (!data.length) {
        container.textContent = "Brak zgłoszeń.";
        return;
    }

    const { data: wspolnoty } = await client
        .from("communities")
        .select("id, name");

    for (const t of data) {

        const wsp = wspolnoty.find(w => w.id === t.users?.community_id);

        const { data: files } = await client
            .from("tickets_files")
            .select("*")
            .eq("ticket_id", t.id);

        let filesHtml = "";

        if (files && files.length) {
            files.forEach(f => {
                if (f.file_url.match(/\.(jpg|jpeg|png|gif)$/i)) {
                    filesHtml += `<img src="${f.file_url}">`;
                } else {
                    filesHtml += `<a href="${f.file_url}" target="_blank">${f.file_name}</a>`;
                }
            });
        }

        const div = document.createElement("div");
        div.className = "ticket-card pro-ticket-card" + (t.status === "zakończone" ? " completed" : "");

        div.innerHTML = `
            <h3>${t.title}</h3>
            <p>${t.description}</p>

            <p><strong>Mieszkaniec:</strong> ${t.users?.login ?? "nieznany"}</p>
            <p><strong>Wspólnota:</strong> ${wsp ? wsp.name : "—"}</p>

            <div class="ticket-files">${filesHtml}</div>

            <span class="ticket-status pro-status">Status: ${t.status}</span>
            <span class="ticket-priority pro-priority">Priorytet: ${t.priority}</span>

            ${t.status !== "zakończone" ? `<button class="finish-btn uh-btn uh-btn-gold">Zakończ</button>` : ""}
        `;

        const finishBtn = div.querySelector(".finish-btn");
        if (finishBtn) {
            finishBtn.onclick = async () => {
                await client
                    .from("tickets")
                    .update({ status: "zakończone" })
                    .eq("id", t.id);

                div.classList.add("completed");
                finishBtn.remove();
            };
        }

        container.appendChild(div);
    }
}

/* ---------------------------------------------
   START
--------------------------------------------- */
loadCommunities();
loadPendingUsers();
loadTickets();

</script>

</body>
</html>
