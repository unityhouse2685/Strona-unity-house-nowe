<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie – Unity House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="auth.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="system.js?v=999" defer></script>


    <!-- Blokada autouzupełniania -->
    <style>
        input:-webkit-autofill {
            transition: background-color 9999s ease-in-out 0s;
        }
    </style>
</head>

<body class="login-body">

<div class="login-container">
    <h2 class="login-title">Logowanie</h2>

    <form id="loginForm" autocomplete="off">

        <label>Email</label>
        <input 
            type="text" 
            id="loginEmail" 
            name="uh_email"
            required 
            autocomplete="new-email"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
        >

        <label>Hasło</label>
        <input 
            type="password" 
            id="loginPassword" 
            name="uh_pass"
            required 
            autocomplete="new-password"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
        >

        <button class="uh-btn uh-btn-gold full">Zaloguj się</button>
    </form>

    <div class="login-links">
        <a href="register.html">Nie masz konta? Zarejestruj się</a>
    </div>

    <p class="login-footer">© <span id="year"></span> Unity House Gostyń</p>
</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
