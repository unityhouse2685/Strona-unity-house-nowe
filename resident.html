<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel mieszkańca – Unity House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- STYLE -->
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="resident.css">

    <!-- SUPABASE + SYSTEM -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="system.js"></script> <!-- bez defer -->
</head>

<body class="uh-body">

<header class="uh-topbar pro-topbar">
    <div class="uh-logo pro-logo">Unity House</div>
    <nav class="uh-nav">
        <span class="uh-nav-label pro-nav-label">Panel mieszkańca</span>
        <button id="logoutBtn" class="uh-btn uh-btn-outline pro-logout">Wyloguj</button>
    </nav>
</header>

<main class="uh-main panel pro-panel">

    <!-- SEKCJA 1 — DANE MIESZKAŃCA -->
    <section class="panel-section pro-section">
        <h2 class="pro-section-title">Moje dane</h2>
        <div id="residentInfo" class="info-box pro-info-box">
            Ładowanie danych...
        </div>
    </section>

    <!-- SEKCJA 2 — ZGŁOSZENIE USTERKI -->
    <section class="panel-section pro-section">
        <h2 class="pro-section-title">Zgłoś usterkę</h2>

        <form id="ticketForm" class="ticket-form pro-ticket-form">
            <input type="text" id="ticketTitle" placeholder="Tytuł zgłoszenia" required class="pro-input">
            <textarea id="ticketDescription" placeholder="Opis usterki" required class="pro-textarea"></textarea>

            <select id="ticketPriority" class="pro-select">
                <option value="niski">Niski</option>
                <option value="średni">Średni</option>
                <option value="wysoki">Wysoki</option>
            </select>

            <!-- NOWE: ZAŁĄCZNIKI -->
            <label class="pro-label">Załączniki (opcjonalnie):</label>
            <input type="file" id="ticketFiles" multiple class="pro-input">

            <button class="uh-btn uh-btn-gold pro-btn">Wyślij zgłoszenie</button>
        </form>
    </section>

    <!-- SEKCJA 3 — MOJE ZGŁOSZENIA -->
    <section class="panel-section pro-section">
        <h2 class="pro-section-title">Moje zgłoszenia</h2>
        <div id="myTicketsList" class="tickets-list pro-tickets"></div>
    </section>

</main>

<script defer>
/* ---------------------------------------------
   WYLOGOWANIE
--------------------------------------------- */
document.getElementById("logoutBtn").onclick = () => {
    localStorage.clear();
    window.location.href = "login.html";
};

/* ---------------------------------------------
   ŁADOWANIE DANYCH MIESZKAŃCA
--------------------------------------------- */
async function loadResidentInfo() {
    const userId = localStorage.getItem("uh_user_id");

    const { data: userData, error: userError } = await client
        .from("users")
        .select("login, wspolnota")
        .eq("id", userId)
        .single();

    const box = document.getElementById("residentInfo");

    if (userError || !userData) {
        box.textContent = "Błąd ładowania danych użytkownika.";
        return;
    }

    const { data: wspolnotaData, error: wspError } = await client
        .from("communities")
        .select("name")
        .eq("id", userData.wspolnota)
        .single();

    if (wspError || !wspolnotaData) {
        box.innerHTML = `
            <p><strong>Login:</strong> ${userData.login}</p>
            <p><strong>Wspólnota:</strong> (nieznana)</p>
        `;
        return;
    }

    box.innerHTML = `
        <p><strong>Login:</strong> ${userData.login}</p>
        <p><strong>Wspólnota:</strong> ${wspolnotaData.name}</p>
    `;
}

/* ---------------------------------------------
   WYSYŁANIE ZGŁOSZENIA + UPLOAD PLIKÓW
--------------------------------------------- */
document.getElementById("ticketForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const userId = localStorage.getItem("uh_user_id");

    const title = ticketTitle.value.trim();
    const description = ticketDescription.value.trim();
    const priority = ticketPriority.value;

    // 1. Tworzymy zgłoszenie i pobieramy jego ID
    const { data: ticketData, error: ticketError } = await client
        .from("tickets")
        .insert({
            user_id: userId,
            title,
            description,
            priority,
            status: "nowe"
        })
        .select()
        .single();

    if (ticketError) {
        alert("Nie udało się wysłać zgłoszenia.");
        console.error(ticketError);
        return;
    }

    const ticketId = ticketData.id;

    // 2. Upload plików
    const files = document.getElementById("ticketFiles").files;

    for (const file of files) {
        const path = `${ticketId}/${file.name}`;

        const { error: uploadError } = await client.storage
            .from("tickets-files")
            .upload(path, file);

        if (uploadError) {
            console.error("Błąd uploadu:", uploadError);
            continue;
        }

        const publicUrl = client.storage
            .from("tickets-files")
            .getPublicUrl(path).data.publicUrl;

        await client.from("tickets_files").insert({
            ticket_id: ticketId,
            file_url: publicUrl,
            file_name: file.name
        });
    }

    // 3. Reset formularza
    ticketTitle.value = "";
    ticketDescription.value = "";
    ticketPriority.value = "niski";
    document.getElementById("ticketFiles").value = "";

    loadMyTickets();
});

/* ---------------------------------------------
   ŁADOWANIE ZGŁOSZEŃ MIESZKAŃCA
--------------------------------------------- */
async function loadMyTickets() {
    const userId = localStorage.getItem("uh_user_id");

    const { data, error } = await client
        .from("tickets")
        .select("*")
        .eq("user_id", userId)
        .order("created_at", { ascending: false });

    const container = document.getElementById("myTicketsList");
    container.innerHTML = "";

    if (error) {
        container.textContent = "Błąd ładowania zgłoszeń.";
        console.error(error);
        return;
    }

    if (!data.length) {
        container.textContent = "Brak zgłoszeń.";
        return;
    }

    data.forEach(t => {
        const div = document.createElement("div");
        div.className = "ticket-card pro-ticket-card";
        div.innerHTML = `
            <h3>${t.title}</h3>
            <p>${t.description}</p>
            <span class="ticket-status pro-status">Status: ${t.status}</span>
            <span class="ticket-priority pro-priority">Priorytet: ${t.priority}</span>
        `;
        container.appendChild(div);
    });
}

/* ---------------------------------------------
   START
--------------------------------------------- */
loadResidentInfo();
loadMyTickets();
</script>

</body>
</html>
